<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFai 会员专区 - Espace Membres</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --forest: #1a4d2e;
            --sage: #4a7c59;
            --lavender: #7c6a9c;
            --cream: #f8f5f0;
            --gold: #c9a227;
            --rose: #d4a5a5;
        }
        body {
            font-family: 'Noto Sans SC', 'DM Sans', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Hero */
        .hero {
            flex: 1;
            background: linear-gradient(135deg, var(--forest) 0%, #0d2818 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }
        .hero-content {
            text-align: center;
            max-width: 600px;
        }
        .logo-mark {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--forest), var(--sage));
            border-radius: 24px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .hero-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            margin-bottom: 48px;
        }
        .hero-desc {
            color: rgba(255,255,255,0.85);
            font-size: 15px;
            margin-bottom: 48px;
            line-height: 1.7;
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 560px;
            margin: 0 auto;
            width: 100%;
        }
        @media (max-width: 500px) {
            .cards { grid-template-columns: 1fr; }
            .hero-title { font-size: 36px; }
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.15);
        }
        .card-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .card-icon.green { background: linear-gradient(135deg, var(--forest), var(--sage)); }
        .card-icon.purple { background: linear-gradient(135deg, var(--lavender), #9b8ab8); }
        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--forest);
        }
        .card-desc {
            font-size: 13px;
            color: #888;
            text-align: center;
            line-height: 1.5;
        }
        .card-arrow {
            font-size: 20px;
            color: var(--sage);
            margin-top: 4px;
        }

        /* Footer */
        .footer {
            background: rgba(0,0,0,0.2);
            padding: 16px 20px;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
        .footer a { color: rgba(255,255,255,0.7); text-decoration: none; }
        .footer a:hover { color: white; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-content">
            <div class="logo-mark">🌿</div>
            <h1 class="hero-title">AFai 会员专区</h1>
            <p class="hero-subtitle">法国国际芳香文化交流协会 · Espace Privé</p>
            <p class="hero-desc">
                欢迎来到 AFai 会员专属空间<br>
                选择下方服务，开始使用
            </p>

            <div class="cards">
                <!-- AI 香氛 -->
                <a class="card" href="aroma-ai.html">
                    <div class="card-icon green">✨</div>
                    <div class="card-title">香氛 AI</div>
                    <div class="card-desc">选择情绪，AI 为您生成100种精油配方</div>
                    <div class="card-arrow">→</div>
                </a>

                <!-- 证书查询 -->
                <a class="card" href="certificates.html">
                    <div class="card-icon purple">📜</div>
                    <div class="card-title">查询我的证书</div>
                    <div class="card-desc">输入注册邮箱，查看您的专属认证证书</div>
                    <div class="card-arrow">→</div>
                </a>
            </div>
        </div>
    </div>

    <footer class="footer">
        © 2026 AFai · <a href="https://afai.pro">返回官网</a>
    </footer>

</body>
</html>
