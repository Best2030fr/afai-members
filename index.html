<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Membres | AFai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-forest: #1a4d2e; --color-sage: #4a7c59;
            --color-cream: #f8f5f0; --color-dark: #2d2d2d;
            --shadow-elevated: 0 8px 40px rgba(26, 77, 46, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--color-cream); height: 100vh; display: flex; flex-direction: column; }
        
        /* 登入畫面 */
        .login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--color-forest) 0%, #0d2818 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.6s ease; }
        .login-screen.hidden { opacity: 0; pointer-events: none; }
        .login-card { background: rgba(255, 255, 255, 0.95); padding: 50px 40px; border-radius: 24px; box-shadow: var(--shadow-elevated); text-align: center; width: 90%; max-width: 400px; }
        .login-logo { width: 70px; height: 70px; margin: 0 auto 20px; background: linear-gradient(135deg, var(--color-forest), var(--color-sage)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .login-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--color-forest); margin-bottom: 24px; }
        .login-input { width: 100%; padding: 14px 18px; border: 2px solid #e8e4de; border-radius: 16px; font-size: 16px; margin-bottom: 16px; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--color-forest), var(--color-sage)); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; }
        
        /* 頂部導航 */
        .header { background: white; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--color-forest), var(--color-sage)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .header-logo-text { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--color-forest); }
        .logout-btn { padding: 8px 16px; border: 1px solid #ddd; background: transparent; border-radius: 8px; cursor: pointer; }
        
        /* 嵌入的 Airtable 區域 */
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .iframe-container { flex: 1; background: white; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-elevated); border: 1px solid #e8e4de; min-height: 600px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-logo">🌿</div>
            <h1 class="login-title">Espace Membres</h1>
            <input type="password" class="login-input" id="passwordInput" placeholder="Mot de passe (AFai2026)" autocomplete="off">
            <button class="login-btn" id="loginBtn">Accéder</button>
        </div>
    </div>

    <header class="header">
        <a href="#" class="header-logo">
            <div class="header-logo-icon">🌿</div>
            <span class="header-logo-text">AFai Répertoire</span>
        </a>
        <button class="logout-btn" id="logoutBtn">Déconnexion</button>
    </header>

    <main class="main-content">
        <div class="iframe-container">
            <iframe class="airtable-embed" src="https://airtable.com/embed/appXX10VsA0OB6AaM/tblBrrzQ6g4kHeQCc/viwKW387Tdx2sI6dR?backgroundColor=green&viewControls=on" frameborder="0" onmousewheel="" width="100%" height="100%" style="background: transparent;"></iframe>
        </div>
    </main>

    <script>
        const CORRECT_PASSWORD = 'AFai2026';
        if (sessionStorage.getItem('afai_auth') === 'true') {
            document.getElementById('loginScreen').classList.add('hidden');
        }
        document.getElementById('loginBtn').addEventListener('click', () => {
            if (document.getElementById('passwordInput').value === CORRECT_PASSWORD) {
                sessionStorage.setItem('afai_auth', 'true');
                document.getElementById('loginScreen').classList.add('hidden');
            }
        });
        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('afai_auth');
            location.reload();
        });
    </script>
</body>
</html>
