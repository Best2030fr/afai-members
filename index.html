<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Membres | AFai - Association Française de l'Arôme</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-forest: #1a4d2e; --color-sage: #4a7c59;
            --color-cream: #f8f5f0; --color-dark: #2d2d2d;
            --shadow-elevated: 0 10px 40px rgba(26, 77, 46, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 强制页面填满高度，防止出现双滚动条 */
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--color-cream); font-family: 'DM Sans', sans-serif; }
        
        /* 登录遮罩层 */
        .login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--color-forest) 0%, #0d2818 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .login-screen.hidden { opacity: 0; visibility: hidden; transform: translateY(-20px); }
        .login-card { background: rgba(255, 255, 255, 0.98); padding: 50px 40px; border-radius: 28px; box-shadow: var(--shadow-elevated); text-align: center; width: 90%; max-width: 420px; }
        .login-logo { width: 80px; height: 80px; margin: 0 auto 24px; background: linear-gradient(135deg, var(--color-forest), var(--color-sage)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; color: white; }
        .login-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; color: var(--color-forest); margin-bottom: 30px; }
        .login-input { width: 100%; padding: 16px 20px; border: 2px solid #e8e4de; border-radius: 16px; font-size: 16px; margin-bottom: 20px; outline: none; transition: border-color 0.3s; }
        .login-input:focus { border-color: var(--color-sage); }
        .login-btn { width: 100%; padding: 16px; background: var(--color-forest); color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .login-btn:hover { background: #0d2818; transform: translateY(-2px); }

        /* 主界面结构 */
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100%; }
        
        .header { background: white; padding: 14px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.06); z-index: 10; }
        .header-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-logo-icon { font-size: 24px; }
        .header-logo-text { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--color-forest); }
        .logout-btn { padding: 8px 18px; border: 1px solid #ddd; background: transparent; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--color-muted); }

        /* Airtable 区域：占据所有剩余空间 */
        .content-area { flex: 1; position: relative; width: 100%; height: 100%; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        @media (max-width: 600px) {
            .header { padding: 12px 15px; }
            .header-logo-text { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-logo">🌿</div>
            <h1 class="login-title">Espace Membres</h1>
            <input type="password" class="login-input" id="passwordInput" placeholder="Mot de passe (AFai2026)" autocomplete="off">
            <button class="login-btn" id="loginBtn">Entrer</button>
        </div>
    </div>

    <div class="app-container">
        <header class="header">
            <a href="#" class="header-logo">
                <span class="header-logo-icon">🌿</span>
                <span class="header-logo-text">AFai Répertoire</span>
            </a>
            <button class="logout-btn" id="logoutBtn">Déconnexion</button>
        </header>

        <main class="content-area">
            <iframe src="https://airtable.com/embed/appfmRmjYiUjarkDn/shrh1wp2U3csgbCcL?backgroundColor=green&viewControls=on" 
                    frameborder="0" 
                    onmousewheel="" 
                    width="100%" 
                    height="100%" 
                    style="background: transparent;">
            </iframe>
        </main>
    </div>

    <script>
        const PASS = 'AFai2026';
        const screen = document.getElementById('loginScreen');
        const input = document.getElementById('passwordInput');
        
        // 检查是否已登录
        if (sessionStorage.getItem('afai_authenticated') === 'true') {
            screen.classList.add('hidden');
        }

        function tryLogin() {
            if (input.value === PASS) {
                sessionStorage.setItem('afai_authenticated', 'true');
                screen.classList.add('hidden');
            } else {
                alert('Mot de passe incorrect.');
                input.value = '';
            }
        }

        document.getElementById('loginBtn').addEventListener('click', tryLogin);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') tryLogin(); });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('afai_authenticated');
            location.reload();
        });
    </script>
</body>
</html>
